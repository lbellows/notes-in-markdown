name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Publish Linux artifacts
        if: ${{ matrix.target == 'linux' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder@latest --linux --publish never

      - name: Publish Windows artifacts
        if: ${{ matrix.target == 'win' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder@latest --win --publish never

      - name: Publish macOS artifacts
        if: ${{ matrix.target == 'mac' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder@latest --mac --publish never

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.{AppImage,deb,exe,dmg,zip}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

