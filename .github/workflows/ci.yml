name: CI

on:
  push:
    branches:
      - master
      - main

  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test@1.58.2

      - name: Run unit and integration tests
        run: npm test

      - name: Run production build
        run: npm run build

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libxtst6 \
            libx11-xcb1 \
            libxkbcommon0 \
            libxkbfile1 \
            libsecret-1-0 \
            libgbm1 \
            libnotify4 \
            libatspi2.0-0
          sudo apt-get install -y libasound2 || sudo apt-get install -y libasound2t64

      - name: Run Electron smoke e2e tests
        env:
          DEBUG: pw:browser*
        run: npm run test:e2e:ci
